{% set name = "pytest-httpx" %}
{% set version = "0.36.2" %}
{% set python_min = "3.10" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 05a56527484f7f4e8c856419ea379b8dc359c36801c4992fdb330f294c690356

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
    - setuptools_scm
  run:
    - httpx ==0.28.*
    - pytest ==9.*
    - python >={{ python_min }}

test:
  imports:
    - pytest_httpx
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://colin-b.github.io/pytest_httpx/
  summary: Send responses to httpx.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - owenlamont
    - dgasmith
